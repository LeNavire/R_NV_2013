<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Under Construction - Site en Chantier</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Roboto:wght@400;700&display=swap');

        :root {
            --construction-yellow: #facc15;
            --construction-black: #1a1a1a;
        }

        body {
            background-color: var(--construction-black);
            color: white;
            font-family: 'Roboto', sans-serif;
            overflow-x: hidden;
        }

        .stencil-text {
            font-family: 'Black Ops One', cursive;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .hazard-stripes {
            background: repeating-linear-gradient(
                45deg,
                var(--construction-yellow),
                var(--construction-yellow) 20px,
                var(--construction-black) 20px,
                var(--construction-black) 40px
            );
        }

        @keyframes crane-move {
            0%, 100% { transform: rotate(-2deg); }
            50% { transform: rotate(2deg); }
        }

        .crane-animation {
            animation: crane-move 4s ease-in-out infinite;
            transform-origin: bottom center;
        }

        .pulse {
            animation: pulse-animation 2s infinite;
        }

        @keyframes pulse-animation {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        .gear-spin {
            animation: spin 10s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

    <!-- Bordure supérieure de chantier -->
    <div class="fixed top-0 left-0 w-full h-6 hazard-stripes border-b-4 border-yellow-500 shadow-lg"></div>

    <!-- Contenu Principal -->
    <main class="max-w-3xl w-full text-center space-y-8 z-10">
        
        <!-- Icône de Chantier (Cône SVG) -->
        <div class="flex justify-center mb-6">
            <svg class="w-32 h-32 text-yellow-400 gear-spin" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
            </svg>
        </div>

        <h1 class="stencil-text text-5xl md:text-7xl text-yellow-400 font-bold mb-2">
            Under Construction
        </h1>
        
        <p class="text-xl md:text-2xl text-gray-300 font-light max-w-xl mx-auto uppercase tracking-widest">
            Application en cours de révision
        </p>

        <!-- Barre de progression de chantier -->
        <div class="w-full bg-gray-800 rounded-full h-8 border-2 border-yellow-500 overflow-hidden relative">
            <div id="progress-bar" class="h-full hazard-stripes transition-all duration-1000" style="width: 65%;"></div>
            <div class="absolute inset-0 flex items-center justify-center font-bold text-black drop-shadow-sm" id="progress-text">
                RECONSTRUCTION EN COURS : 65%
            </div>
        </div>

        <!-- Panneau d'avertissement -->
        <div class="bg-yellow-400 text-black p-6 rounded-lg shadow-2xl border-4 border-white inline-block transform -rotate-1">
            <div class="flex items-center space-x-4">
                <svg class="w-10 h-10" fill="currentColor" viewBox="0 0 20 20">
                    <path fill-rule="evenodd" d="M8.257 3.099c.765-1.36 2.722-1.36 3.486 0l5.58 9.92c.75 1.334-.213 2.98-1.742 2.98H4.42c-1.53 0-2.493-1.646-1.743-2.98l5.58-9.92zM11 13a1 1 0 11-2 0 1 1 0 012 0zm-1-8a1 1 0 00-1 1v3a1 1 0 002 0V6a1 1 0 00-1-1z" clip-rule="evenodd"></path>
                </svg>
                <div class="text-left">
                    <h2 class="font-bold text-xl uppercase italic">Zone de travaux</h2>
                    <p class="text-sm font-semibold">Nos ingénieurs travaillent d'arrache-pied pour améliorer votre expérience.</p>
                </div>
            </div>
        </div>

        <!-- Section de notification -->
        <div class="mt-12 bg-gray-900/50 p-6 rounded-xl border border-gray-700 backdrop-blur-sm">
            <h3 class="text-white font-bold mb-4">Être informé du redémarrage ?</h3>
            <div class="flex flex-col md:flex-row gap-2">
                <input type="email" placeholder="Votre adresse email" class="flex-grow bg-black border border-gray-600 p-3 rounded text-white focus:border-yellow-400 outline-none">
                <button class="bg-yellow-400 text-black font-bold py-3 px-8 rounded hover:bg-yellow-300 transition-colors uppercase">
                    M'avertir
                </button>
            </div>
        </div>
    </main>

    <!-- Bordure inférieure de chantier -->
    <div class="fixed bottom-0 left-0 w-full h-6 hazard-stripes border-t-4 border-yellow-500 shadow-inner"></div>

    <!-- Éléments de décoration flottants (Icônes) -->
    <div class="hidden lg:block fixed bottom-10 left-10 opacity-20 hover:opacity-100 transition-opacity crane-animation">
        <svg class="w-48 h-48 text-yellow-500" fill="currentColor" viewBox="0 0 24 24">
            <path d="M22,19V17H19V10H20V8H15V10H16V17H13V9H14V7H11V9H12V17H9V12H10V10H7V12H8V17H5V14H6V12H3V14H4V17H2V19H22M5,5H19V7H5V5Z" />
        </svg>
    </div>

    <script>
        // Simulation d'une progression dynamique
        let progress = 65;
        const bar = document.getElementById('progress-bar');
        const text = document.getElementById('progress-text');

        setInterval(() => {
            if (progress < 98) {
                progress += Math.random() * 0.5;
                bar.style.width = progress + '%';
                text.innerText = `RECONSTRUCTION EN COURS : ${Math.floor(progress)}%`;
            }
        }, 3000);
    </script>
</body>
</html>
