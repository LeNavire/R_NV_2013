<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La valeur du gratuit</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;600&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            overflow: hidden;
        }

        .quote-container {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            padding: 4rem;
            max-width: 800px;
            width: 90%;
            text-align: center;
            position: relative;
            transform: translateY(20px);
            opacity: 0;
            animation: fadeUp 1s ease-out forwards;
        }

        .quote-icon {
            font-size: 4rem;
            color: #cbd5e1;
            position: absolute;
            top: 2rem;
            left: 2rem;
            font-family: 'Playfair Display', serif;
            line-height: 1;
            opacity: 0.5;
        }

        .quote-text {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            line-height: 1.4;
            color: #1e293b;
            margin-bottom: 2rem;
            position: relative;
            z-index: 1;
        }

        .highlight {
            color: #3b82f6;
            font-weight: 700;
            position: relative;
            display: inline-block;
        }

        .highlight::after {
            content: '';
            position: absolute;
            bottom: 0.2rem;
            left: 0;
            width: 100%;
            height: 0.3rem;
            background-color: #bfdbfe;
            z-index: -1;
            transform: scaleX(0);
            transform-origin: left;
            animation: highlightIn 1s 1s ease-out forwards;
        }

        @keyframes fadeUp {
            from {
                transform: translateY(40px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        @keyframes highlightIn {
            to {
                transform: scaleX(1);
            }
        }

        /* Floating particles for a subtle effect */
        .particle {
            position: absolute;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            pointer-events: none;
            animation: float linear infinite;
        }

        @keyframes float {
            0% {
                transform: translateY(100vh) scale(0);
                opacity: 0;
            }
            50% {
                opacity: 1;
            }
            100% {
                transform: translateY(-20vh) scale(1);
                opacity: 0;
            }
        }

        @media (max-width: 640px) {
            .quote-container {
                padding: 2rem;
            }
            .quote-text {
                font-size: 1.75rem;
            }
            .quote-icon {
                font-size: 2.5rem;
                top: 1rem;
                left: 1rem;
            }
        }
    </style>
</head>
<body>

    <div id="particles-container"></div>

    <main class="quote-container group hover:shadow-2xl transition-shadow duration-500">
        <span class="quote-icon" aria-hidden="true">"</span>
        
        <blockquote class="quote-text">
            Le gratuit n’est jamais vraiment valorisé.<br>
            Pourtant, c’est souvent ce qui apporte <br>
            <span class="highlight">le plus de valeur</span>.
        </blockquote>
        
        <div class="mt-8 pt-6 border-t border-gray-200">
            <p class="text-gray-500 text-sm tracking-widest uppercase font-semibold">
                Une réflexion sur la perception......Bernoulli
            </p>
        </div>
    </main>

    <script>
        // Create subtle floating particles in the background
        function createParticles() {
            const container = document.getElementById('particles-container');
            const particleCount = 20;

            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.classList.add('particle');
                
                // Randomize properties
                const size = Math.random() * 10 + 5; // Size between 5px and 15px
                const left = Math.random() * 100; // Position anywhere across width
                const duration = Math.random() * 10 + 10; // Duration between 10s and 20s
                const delay = Math.random() * 5; // Delay start up to 5s

                particle.style.width = `${size}px`;
                particle.style.height = `${size}px`;
                particle.style.left = `${left}vw`;
                particle.style.animationDuration = `${duration}s`;
                particle.style.animationDelay = `${delay}s`;

                container.appendChild(particle);
            }
        }

        // Initialize particles on load
        window.addEventListener('load', createParticles);
    </script>
</body>
</html>
